services:
  ros:
    build: .
    command: tail -f /dev/null
    shm_size: '512m'        # FastDDS SHM transport for large msgs (PointCloud2, OctoMap)
    cap_add:
      - SYS_NICE            # allow renice / real-time thread priority inside container
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./ros2_ws/src:/root/ros2_ws/src
    environment:
      - DISPLAY=novnc:0.0
    env_file:
      - ros.env
    networks:
      - x11

  novnc:
    image: theasp/novnc:latest
    env_file:
      - novnc.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "--tries=1", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - x11

networks:
  x11:
